name: Daily AI Market Brief

on:
  schedule:
    - cron: "0 1 * * *"
     
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-market-brief
  cancel-in-progress: false

jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Generate and send daily report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: python main.py

      - name: Save report to repository
        if: always()
        run: |
          if [ ! -d "reports" ]; then
            echo "No reports directory was created."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/

          if git diff --cached --quiet; then
            echo "No new report changes to commit."
            exit 0
          fi

          git commit -m "Add daily AI market report"
          git push
