name: Test Feishu Webhook

on:
  workflow_dispatch:

jobs:
  send-test-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send test message to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          webhook_url = os.environ.get("FEISHU_WEBHOOK_URL")

          if not webhook_url:
              raise RuntimeError(
                  "没有读取到 FEISHU_WEBHOOK_URL，请检查 GitHub Secret 名称。"
              )

          message = {
              "msg_type": "text",
              "content": {
                  "text": (
                      "AI资本日报｜连接测试\n\n"
                      "GitHub Actions 已成功调用飞书机器人。\n"
                      "如果你在手机上看到这条消息，说明推送连接正常。"
                  )
              }
          }

          request = urllib.request.Request(
              webhook_url,
              data=json.dumps(
                  message,
                  ensure_ascii=False
              ).encode("utf-8"),
              headers={
                  "Content-Type": "application/json; charset=utf-8"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(
                  request,
                  timeout=30
              ) as response:
                  result = response.read().decode("utf-8")
                  print("HTTP status:", response.status)
                  print("Feishu response:", result)

                  response_data = json.loads(result)

                  if response_data.get("code") not in (0, None):
                      raise RuntimeError(
                          f"飞书返回错误：{response_data}"
                      )

                  print("测试消息发送成功。")

          except urllib.error.HTTPError as error:
              error_body = error.read().decode(
                  "utf-8",
                  errors="replace"
              )
              raise RuntimeError(
                  f"HTTP 请求失败：{error.code}，"
                  f"飞书返回：{error_body}"
              ) from error

          except urllib.error.URLError as error:
              raise RuntimeError(
                  f"无法连接飞书 Webhook：{error.reason}"
              ) from error
          PY
